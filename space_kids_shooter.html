<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Kids Shooter 🚀</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #gameCanvas { display: block; border: 2px solid #222; }
        #ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .screen {
            display: none;
            background: rgba(0,0,25,0.97);
            border: 2px solid #4af;
            border-radius: 18px;
            padding: 30px;
            text-align: center;
            color: white;
            max-width: 640px;
            width: 92%;
            pointer-events: all;
            box-shadow: 0 0 40px rgba(68,170,255,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        .screen.active { display: block; }
        h1 { color: #4af; font-size: 2em; margin-bottom: 20px; text-shadow: 0 0 15px #4af; }
        h2 { color: #fa4; font-size: 1.5em; margin-bottom: 15px; text-shadow: 0 0 10px #fa4; }
        input[type="text"] {
            width: 100%; padding: 12px;
            font-size: 1.2em;
            background: #001133;
            border: 2px solid #4af;
            color: white;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
        }
        input[type="text"]:focus { outline: none; border-color: #8cf; box-shadow: 0 0 10px #4af; }
        .btn {
            padding: 13px 28px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #1a7, #0a5);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin: 6px;
            transition: all 0.2s;
            font-weight: bold;
        }
        .btn:hover { transform: scale(1.06); background: linear-gradient(135deg, #2b8, #1a6); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn.danger { background: linear-gradient(135deg, #a33, #722); }
        .btn.danger:hover { background: linear-gradient(135deg, #c44, #933); }
        .slider-wrap { margin: 14px 0; text-align: left; }
        .slider-wrap label { color: #8cf; font-size: 0.95em; display: block; margin-bottom: 6px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #4af; }
        .slider-val { color: #fa0; font-weight: bold; }
        .pu-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 7px;
            margin: 14px 0;
        }
        .pu-btn {
            padding: 8px 4px;
            font-size: 0.78em;
            background: #111833;
            border: 2px solid #336;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            line-height: 1.4;
        }
        .pu-btn:hover { border-color: #88f; background: #1a2a55; }
        .pu-btn.sel { border-color: #fa0; background: #3a1800; box-shadow: 0 0 8px #fa0; }
        .score-tbl { width: 100%; border-collapse: collapse; margin: 14px 0; }
        .score-tbl th, .score-tbl td { padding: 8px; border-bottom: 1px solid #224; }
        .score-tbl th { color: #4af; background: #001122; }
        .score-tbl tr:nth-child(even) { background: #050518; }
        .info { color: #89a; font-size: 0.88em; margin: 5px 0; }
        .big-score { color: #4f4; font-size: 1.5em; font-weight: bold; margin: 10px 0; }
        .divider { border: none; border-top: 1px solid #336; margin: 14px 0; }
        .controls-hint { color: #556; font-size: 0.78em; margin-top: 8px; }
        .gold { color: #fa0; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="ui">

    <!-- MAIN MENU -->
    <div id="scnMenu" class="screen active">
        <h1>🚀 Space Kids Shooter</h1>
        <label style="color:#8cf">שם השחקן:</label>
        <input type="text" id="inpName" placeholder="הכנס שם..." maxlength="20" />
        <hr class="divider"/>
        <div class="slider-wrap">
            <label>רמת קושי: <span class="slider-val" id="lblDiff">3</span>
                <span id="lblDiffDesc" style="color:#fa0"> — בינוני</span>
            </label>
            <input type="range" id="slDiff" min="1" max="5" value="3"/>
        </div>
        <div class="slider-wrap">
            <label>מספר חיים: <span class="slider-val" id="lblLives">5</span></label>
            <input type="range" id="slLives" min="3" max="10" value="5"/>
        </div>
        <hr class="divider"/>
        <button class="btn" onclick="startGame()">🚀 התחל משחק!</button>
        <button class="btn" onclick="showHighScores()" style="background:linear-gradient(135deg,#76a,#547)">🏆 טבלת שיאים</button>
        <p class="controls-hint">⌨️ חיצים / WASD לתזוזה &nbsp;|&nbsp; רווח / לחיצה לירי &nbsp;|&nbsp; B לפצצה</p>
    </div>

    <!-- POWER-UP SELECTION -->
    <div id="scnPowerup" class="screen">
        <h2>⚡ בחר 5 כוחות לרמה <span id="lblPuLevel">1</span></h2>
        <p class="info">לחץ על 5 כוחות שתרצה לקחת</p>
        <p class="info">נבחרו: <span class="gold" id="lblSelCount">0</span> / 5</p>
        <div class="pu-grid" id="puGrid"></div>
        <button class="btn" id="btnStartLevel" onclick="startLevel()" disabled>▶ התחל רמה!</button>
    </div>

    <!-- LEVEL COMPLETE -->
    <div id="scnLevelDone" class="screen">
        <h2>🎉 כל הכבוד! עברת את הרמה!</h2>
        <p id="lblLevelScore" class="big-score"></p>
        <button class="btn" onclick="nextLevel()">➡ רמה הבאה</button>
    </div>

    <!-- GAME OVER -->
    <div id="scnGameOver" class="screen">
        <h2>💀 נגמרו החיים!</h2>
        <p id="lblFinalScore" class="big-score"></p>
        <button class="btn" onclick="backToMenu()">🏠 תפריט ראשי</button>
        <button class="btn" onclick="showHighScores()" style="background:linear-gradient(135deg,#76a,#547)">🏆 טבלת שיאים</button>
    </div>

    <!-- VICTORY -->
    <div id="scnVictory" class="screen">
        <h1 style="font-size:2.5em">🏆 ניצחת! 🏆</h1>
        <p style="color:#8cf;margin-bottom:10px">עברת את כל 5 הרמות!</p>
        <p id="lblVictoryScore" class="big-score"></p>
        <button class="btn" onclick="backToMenu()">🏠 תפריט ראשי</button>
        <button class="btn" onclick="showHighScores()" style="background:linear-gradient(135deg,#76a,#547)">🏆 טבלת שיאים</button>
    </div>

    <!-- HIGH SCORES -->
    <div id="scnScores" class="screen">
        <h2>🏆 טבלת שיאים</h2>
        <table class="score-tbl">
            <thead><tr><th>#</th><th>שם</th><th>ניקוד</th><th>רמה</th><th>תאריך</th></tr></thead>
            <tbody id="scoreTbody"></tbody>
        </table>
        <button class="btn danger" onclick="clearScores()">🗑 נקה טבלה</button>
        <button class="btn" onclick="backToMenu()">🏠 חזור לתפריט</button>
    </div>

</div>

<script>
// =============================================================
//  CANVAS SETUP
// =============================================================
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
canvas.width  = 800;
canvas.height = 600;

// =============================================================
//  AUDIO  (Web Audio API — no external files needed)
// =============================================================
let AC = null;
function ac() {
    if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    return AC;
}

function tone(freq, dur, type = 'square', vol = 0.25) {
    try {
        const a = ac();
        const o = a.createOscillator();
        const g = a.createGain();
        o.connect(g); g.connect(a.destination);
        o.type = type; o.frequency.value = freq;
        g.gain.setValueAtTime(vol, a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
        o.start(a.currentTime); o.stop(a.currentTime + dur);
    } catch(e) {}
}

function noise(dur, vol = 0.35) {
    try {
        const a  = ac();
        const sr = a.sampleRate;
        const buf = a.createBuffer(1, sr * dur, sr);
        const d  = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
        const src = a.createBufferSource();
        const g   = a.createGain();
        src.buffer = buf; src.connect(g); g.connect(a.destination);
        g.gain.value = vol; src.start();
    } catch(e) {}
}

const SFX = {
    shoot:       () => tone(900, 0.08, 'square', 0.18),
    enemyShoot:  () => tone(400, 0.1, 'sawtooth', 0.12),
    hit:         () => { tone(250, 0.2, 'sawtooth', 0.3); },
    explosion:   () => noise(0.3, 0.4),
    powerup:     () => [500,700,900,1100].forEach((f,i)=>setTimeout(()=>tone(f,0.12,'sine',0.28),i*75)),
    levelDone:   () => [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'sine',0.38),i*160)),
    victory:     () => [523,659,784,1047,1175,1397].forEach((f,i)=>setTimeout(()=>tone(f,0.25,'sine',0.4),i*140)),
    gameOver:    () => [400,330,260,200].forEach((f,i)=>setTimeout(()=>tone(f,0.35,'sawtooth',0.28),i*220)),
    extraLife:   () => [600,900,1200].forEach((f,i)=>setTimeout(()=>tone(f,0.15,'sine',0.35),i*100)),
    bomb:        () => { noise(0.5, 0.6); tone(100,0.5,'sawtooth',0.4); },
    freeze:      () => [1200,900,600].forEach((f,i)=>setTimeout(()=>tone(f,0.15,'sine',0.3),i*80)),
};

// Background music
let bgTimer = null;
const MUSIC = [261,294,329,294,261,247,220,247,261,294,349,294];
let mStep = 0;
function startMusic() {
    stopMusic();
    function playNote() {
        tone(MUSIC[mStep % MUSIC.length], 0.38, 'sine', 0.06);
        tone(MUSIC[mStep % MUSIC.length] * 2, 0.38, 'triangle', 0.03);
        mStep++;
        bgTimer = setTimeout(playNote, 380);
    }
    playNote();
}
function stopMusic() { clearTimeout(bgTimer); bgTimer = null; }

// =============================================================
//  GAME STATE
// =============================================================
let gState      = 'menu';
let playerName  = 'שחקן';
let difficulty  = 3;
let maxLives    = 5;
let lives       = 5;
let score       = 0;
let currentLvl  = 1;
let selPowerups = [];
let activePU    = {};

// =============================================================
//  POWER-UPS CONFIG
// =============================================================
const PU_LIST = [
    { id:'shield',     emoji:'🛡️', name:'מגן',         desc:'הגנה 10 שניות' },
    { id:'doubleShot', emoji:'🔥', name:'ירי כפול',    desc:'2 כדורים' },
    { id:'tripleShot', emoji:'✨', name:'ירי משולש',   desc:'3 כדורים' },
    { id:'speedBoost', emoji:'⚡', name:'מהירות',      desc:'תנועה מהירה' },
    { id:'bomb',       emoji:'💣', name:'פצצה',        desc:'הורסת הכל (B)' },
    { id:'laser',      emoji:'🔴', name:'לייזר',       desc:'קרן 8 שניות' },
    { id:'extraLife',  emoji:'❤️', name:'חיים נוספים', desc:'+1 חיים' },
    { id:'freeze',     emoji:'❄️', name:'הקפאה',      desc:'קופא 5 שניות' },
    { id:'boomerang',  emoji:'🪃', name:'בומרנג',     desc:'כדור חוזר' },
    { id:'magnet',     emoji:'🧲', name:'מגנט',        desc:'מושך כוכבי ניקוד' },
];

// =============================================================
//  DIFFICULTY CONFIG
// =============================================================
function DIFF() {
    return [
        null,
        { eSpeed:0.55, shootInt:3200, eBulSpeed:3,   pSpeed:6, fireRate:200 },
        { eSpeed:1.0,  shootInt:2600, eBulSpeed:4,   pSpeed:5.5, fireRate:260 },
        { eSpeed:1.5,  shootInt:2000, eBulSpeed:5,   pSpeed:5, fireRate:320 },
        { eSpeed:2.1,  shootInt:1500, eBulSpeed:6,   pSpeed:5, fireRate:380 },
        { eSpeed:2.8,  shootInt:1000, eBulSpeed:7.5, pSpeed:5, fireRate:430 },
    ][difficulty];
}

// =============================================================
//  LEVEL CONFIG
// =============================================================
const LVL_CFG = {
    1: { rows:2, cols:6, types:['basic'],                          bg:'#000012', bossHp:0  },
    2: { rows:3, cols:7, types:['basic','shooter'],                bg:'#001100', bossHp:0  },
    3: { rows:3, cols:8, types:['basic','shooter','fast'],         bg:'#110000', bossHp:0  },
    4: { rows:4, cols:8, types:['basic','shooter','fast','armor'], bg:'#110011', bossHp:0  },
    5: { rows:2, cols:6, types:['shooter','fast','armor'],         bg:'#001111', bossHp:35 },
};

const ETYPE = {
    basic:  { color:'#f44', hp:1, pts:10, sm:1.0,  sh:false, em:'👾' },
    shooter:{ color:'#f84', hp:2, pts:20, sm:0.8,  sh:true,  em:'🤖' },
    fast:   { color:'#ff4', hp:1, pts:15, sm:1.9,  sh:false, em:'🛸' },
    armor:  { color:'#88f', hp:4, pts:35, sm:0.6,  sh:true,  em:'🦾' },
};

// =============================================================
//  GAME OBJECTS
// =============================================================
let player = {};
let bullets = [], eBullets = [], particles = [], starDrops = [];
let enemies = [], boss = null;
let stars = [];
let flash = null;
let lastShot = 0;
let freezeTimer = 0;

// =============================================================
//  IMAGE
// =============================================================
const shipImg = new Image();
shipImg.src = 'Challenge_Mamad/kids photo.png';

// =============================================================
//  INPUT
// =============================================================
const keys = {};
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space' && gState === 'playing') { e.preventDefault(); shoot(); }
    if (e.code === 'KeyB' && gState === 'playing') useBomb();
});
document.addEventListener('keyup',  e => keys[e.code] = false);

canvas.addEventListener('click', () => { if (gState === 'playing') shoot(); });
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (gState === 'playing') shoot();
}, { passive: false });

// =============================================================
//  STARS
// =============================================================
function initStars() {
    stars = Array.from({length:110}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        sp: Math.random() * 1.6 + 0.3,
        sz: Math.random() * 2 + 0.4,
        br: Math.random()
    }));
}

function tickStars() {
    stars.forEach(s => {
        s.y += s.sp;
        if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
    });
}

function drawStars() {
    stars.forEach(s => {
        const b = Math.floor(s.br * 180 + 75);
        ctx.fillStyle = `rgb(${b},${b},${b})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.sz, 0, Math.PI*2);
        ctx.fill();
    });
}

// =============================================================
//  PLAYER INIT
// =============================================================
function initPlayer() {
    const d = DIFF();
    player = {
        x: canvas.width / 2, y: canvas.height - 85,
        w: 68, h: 68,
        speed: d.pSpeed,
        shieldTimer: 0,
        laserTimer: 0,
    };
    if (activePU.extraLife)  { lives = Math.min(lives + 1, maxLives); SFX.extraLife(); }
    if (activePU.speedBoost) player.speed *= 1.65;
    if (activePU.shield)     player.shieldTimer = 10000;
    if (activePU.laser)      player.laserTimer  = 8000;
    if (activePU.freeze)     freezeTimer = 5000;
}

// =============================================================
//  PLAYER UPDATE
// =============================================================
function updatePlayer(dt) {
    const s = player.speed;
    if ((keys.ArrowLeft  || keys.KeyA) && player.x > player.w/2)           player.x -= s;
    if ((keys.ArrowRight || keys.KeyD) && player.x < canvas.width - player.w/2) player.x += s;
    if ((keys.ArrowUp    || keys.KeyW) && player.y > player.h/2)           player.y -= s;
    if ((keys.ArrowDown  || keys.KeyS) && player.y < canvas.height - player.h/2) player.y += s;

    if (player.shieldTimer > 0) player.shieldTimer -= dt;
    if (player.laserTimer  > 0) {
        player.laserTimer -= dt;
        // laser damage
        enemies = enemies.filter(e => {
            if (Math.abs(e.x - player.x) < 18) {
                e.hp -= 0.08;
                spawnParticles(e.x, e.y, e.color, 1);
                if (e.hp <= 0) { killEnemy(e); return false; }
            }
            return true;
        });
        if (boss && Math.abs(boss.x - player.x) < 25) {
            boss.hp -= 0.06;
            if (boss.hp <= 0) killBoss();
        }
    }
    if (freezeTimer > 0) freezeTimer -= dt;
}

// =============================================================
//  PLAYER DRAW
// =============================================================
function drawPlayer() {
    // laser beam
    if (player.laserTimer > 0) {
        ctx.save();
        ctx.strokeStyle = `rgba(255,50,50,${0.7 + 0.3*Math.sin(Date.now()/80)})`;
        ctx.lineWidth = 7;
        ctx.shadowColor = '#f00';
        ctx.shadowBlur = 25;
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - player.h/2);
        ctx.lineTo(player.x, 0);
        ctx.stroke();
        ctx.restore();
    }
    // shield bubble
    if (player.shieldTimer > 0) {
        ctx.save();
        ctx.strokeStyle = `rgba(100,200,255,${0.4 + 0.35*Math.sin(Date.now()/180)})`;
        ctx.lineWidth = 4;
        ctx.shadowColor = '#4af';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.w * 0.75, 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
    }
    // spaceship image
    if (shipImg.complete && shipImg.naturalWidth > 0) {
        ctx.drawImage(shipImg, player.x - player.w/2, player.y - player.h/2, player.w, player.h);
    } else {
        ctx.fillStyle = '#4af';
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - 32);
        ctx.lineTo(player.x - 26, player.y + 26);
        ctx.lineTo(player.x + 26, player.y + 26);
        ctx.closePath();
        ctx.fill();
    }
}

// =============================================================
//  SHOOTING
// =============================================================
function shoot() {
    const now = Date.now();
    if (now - lastShot < DIFF().fireRate) return;
    lastShot = now;
    SFX.shoot();

    if (activePU.tripleShot) {
        [-16, 0, 16].forEach(ang => {
            const r = ang * Math.PI / 180;
            bullets.push({ x: player.x, y: player.y - 32, vx: Math.sin(r)*6, vy: -9, w:4, h:14, color:'#ff0' });
        });
    } else if (activePU.doubleShot) {
        [-9, 9].forEach(off => {
            bullets.push({ x: player.x+off, y: player.y - 32, vx:0, vy:-9, w:4, h:14, color:'#ff0' });
        });
    } else if (activePU.boomerang) {
        bullets.push({ x: player.x, y: player.y-32, vx:0, vy:-9, w:10, h:10, color:'#f80', bm:true, ph:'up', dist:0 });
    } else {
        bullets.push({ x: player.x, y: player.y - 32, vx:0, vy:-9, w:5, h:14, color:'#4ff' });
    }
}

function useBomb() {
    if (!activePU.bomb) return;
    activePU.bomb = false;
    SFX.bomb();
    enemies.forEach(e => { spawnParticles(e.x, e.y, e.color, 12); score += e.pts; });
    enemies = [];
    if (boss) { spawnParticles(boss.x, boss.y, '#f0f', 25); score += boss.pts; boss = null; }
    setFlash('#ff8', 0.55);
}

// =============================================================
//  ENEMIES SPAWN
// =============================================================
let eDir = 1;

function spawnEnemies() {
    enemies = [];
    boss    = null;
    eDir    = 1;
    const lc = LVL_CFG[currentLvl];
    const d  = DIFF();

    for (let r = 0; r < lc.rows; r++) {
        for (let c = 0; c < lc.cols; c++) {
            const tKey = lc.types[Math.floor(Math.random() * lc.types.length)];
            const et   = ETYPE[tKey];
            enemies.push({
                x: 70 + c * (680 / lc.cols),
                y: 55 + r * 72,
                w: 46, h: 46,
                vx: d.eSpeed * et.sm * eDir,
                hp: et.hp, maxHp: et.hp,
                pts: et.pts, color: et.color,
                shoot: et.sh, type: tKey, em: et.em,
                sTimer: Math.random() * 1800 + 500,
                aFrame: 0, aTimer: 0,
            });
        }
    }

    if (lc.bossHp > 0) {
        boss = {
            x: canvas.width/2, y: 80, w: 110, h: 90,
            vx: d.eSpeed * 1.5, hp: lc.bossHp, maxHp: lc.bossHp,
            pts: 600, sTimer: 1200, phase: 0,
        };
    }
}

// =============================================================
//  ENEMIES UPDATE
// =============================================================
function updateEnemies(dt) {
    if (freezeTimer > 0) return;

    let wallHit = false;
    enemies.forEach(e => {
        e.x += e.vx;
        e.aTimer += dt;
        if (e.aTimer > 320) { e.aFrame ^= 1; e.aTimer = 0; }
        if (e.x < 28 || e.x > canvas.width - 28) wallHit = true;
        if (e.shoot) {
            e.sTimer -= dt;
            if (e.sTimer <= 0) {
                e.sTimer = DIFF().shootInt + Math.random() * 1000;
                SFX.enemyShoot();
                eBullets.push({ x:e.x, y:e.y+e.h/2, vx:0, vy:DIFF().eBulSpeed, w:6, h:14, color:'#f55' });
            }
        }
        if (e.y > canvas.height - 90) triggerGameOver();
    });

    if (wallHit) {
        eDir *= -1;
        enemies.forEach(e => {
            e.vx = DIFF().eSpeed * ETYPE[e.type].sm * eDir;
            e.y += 22;
        });
    }

    // Boss
    if (boss) {
        boss.x += boss.vx;
        if (boss.x < 70 || boss.x > canvas.width - 70) boss.vx *= -1;
        boss.sTimer -= dt;
        if (boss.sTimer <= 0) {
            boss.sTimer = 500;
            boss.phase++;
            SFX.enemyShoot();
            const spread = boss.phase % 3 === 0 ? [-30,0,30] : [-15,0,15];
            spread.forEach(ang => {
                const r = ang * Math.PI / 180;
                eBullets.push({ x:boss.x, y:boss.y+boss.h/2, vx:Math.sin(r)*4, vy:DIFF().eBulSpeed*0.85, w:9,h:18, color:'#f0f' });
            });
        }
    }

    // magnet
    if (activePU.magnet) {
        starDrops.forEach(d => {
            const dx = player.x - d.x, dy = player.y - d.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 220 && dist > 1) { d.x += dx/dist*6; d.y += dy/dist*6; }
        });
    }
}

function killEnemy(e) {
    spawnParticles(e.x, e.y, e.color, 9);
    SFX.explosion();
    score += e.pts;
    if (Math.random() < 0.35) starDrops.push({ x:e.x, y:e.y, vy:2.2, val:e.pts, t:1800 });
}

function killBoss() {
    spawnParticles(boss.x, boss.y, '#f0f', 40);
    SFX.explosion(); SFX.levelDone();
    score += boss.pts;
    setFlash('#f0f', 0.6);
    boss = null;
}

// =============================================================
//  ENEMIES DRAW
// =============================================================
function drawEnemies() {
    enemies.forEach(e => {
        if (e.maxHp > 1) {
            ctx.fillStyle = '#333';
            ctx.fillRect(e.x-20, e.y-e.h/2-9, 40, 5);
            ctx.fillStyle = '#0f0';
            ctx.fillRect(e.x-20, e.y-e.h/2-9, 40*(e.hp/e.maxHp), 5);
        }
        ctx.save();
        ctx.translate(e.x, e.y);
        if (e.aFrame) ctx.translate(0, -4);
        ctx.font = `${e.w}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(e.em, 0, 0);
        ctx.restore();
    });

    if (boss) {
        // Boss HP bar
        ctx.fillStyle = '#222';
        ctx.fillRect(40, 18, canvas.width-80, 14);
        const bpct = boss.hp / boss.maxHp;
        const hcolor = bpct > 0.5 ? '#0f0' : bpct > 0.25 ? '#fa0' : '#f00';
        ctx.fillStyle = hcolor;
        ctx.fillRect(40, 18, (canvas.width-80)*bpct, 14);
        ctx.strokeStyle = '#f0f'; ctx.lineWidth = 2;
        ctx.strokeRect(40, 18, canvas.width-80, 14);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('👾 BOSS 👾', canvas.width/2, 29);

        ctx.save();
        ctx.translate(boss.x, boss.y);
        ctx.font = '90px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // pulsate
        const sc = 1 + 0.06 * Math.sin(Date.now()/200);
        ctx.scale(sc, sc);
        ctx.fillText('🛸', 0, 0);
        ctx.restore();
    }
}

// =============================================================
//  BULLETS UPDATE
// =============================================================
function updateBullets(dt) {
    // Player bullets
    bullets = bullets.filter(b => {
        b.x += b.vx; b.y += b.vy;

        if (b.bm) {
            b.dist += Math.abs(b.vy);
            if (b.ph === 'up' && b.dist > 200) { b.ph = 'down'; b.vy = 9; }
            if (b.ph === 'down' && b.y > player.y) return false;
        }
        if (b.y < -25 || b.y > canvas.height+25 || b.x < -25 || b.x > canvas.width+25) return false;

        // hit enemies
        let hit = false;
        enemies = enemies.filter(e => {
            if (!hit && Math.abs(b.x-e.x) < e.w/2+2 && Math.abs(b.y-e.y) < e.h/2+2) {
                e.hp--; hit = true;
                spawnParticles(b.x, b.y, e.color, 3);
                if (e.hp <= 0) { killEnemy(e); return false; }
            }
            return true;
        });
        // hit boss
        if (!hit && boss && Math.abs(b.x-boss.x) < boss.w/2 && Math.abs(b.y-boss.y) < boss.h/2) {
            boss.hp--; hit = true; score += 4;
            spawnParticles(b.x, b.y, '#f0f', 3);
            if (boss.hp <= 0) killBoss();
        }
        return !hit;
    });

    // Enemy bullets
    eBullets = eBullets.filter(b => {
        b.x += b.vx; b.y += b.vy;
        if (b.y > canvas.height+20) return false;
        if (Math.abs(b.x-player.x) < player.w/2 && Math.abs(b.y-player.y) < player.h/2) {
            if (player.shieldTimer <= 0) loseLife();
            return false;
        }
        return true;
    });
}

function drawBullets() {
    bullets.forEach(b => {
        ctx.save();
        ctx.shadowColor = b.color; ctx.shadowBlur = 12;
        if (b.bm) {
            ctx.font = '18px serif'; ctx.textAlign = 'center';
            ctx.fillText('🪃', b.x, b.y);
        } else {
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
        }
        ctx.restore();
    });
    eBullets.forEach(b => {
        ctx.save();
        ctx.fillStyle = b.color;
        ctx.shadowColor = b.color; ctx.shadowBlur = 10;
        ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
        ctx.restore();
    });
}

// =============================================================
//  PARTICLES
// =============================================================
function spawnParticles(x, y, color, n) {
    for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = Math.random() * 4.5 + 1;
        particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, color, life:1, sz: Math.random()*4+2 });
    }
}

function tickParticles(dt) {
    particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= dt/650;
        return p.life > 0;
    });
}

function drawParticles() {
    particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color; ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.sz * p.life, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    });
}

// =============================================================
//  STAR DROPS (score collectibles)
// =============================================================
function tickDrops(dt) {
    starDrops = starDrops.filter(d => {
        d.y += d.vy; d.t -= dt;
        const dx = player.x - d.x, dy = player.y - d.y;
        if (Math.sqrt(dx*dx+dy*dy) < 32) { score += d.val; return false; }
        return d.t > 0;
    });
}

function drawDrops() {
    starDrops.forEach(d => {
        ctx.save();
        ctx.globalAlpha = Math.min(1, d.t/600);
        ctx.font = '20px serif';
        ctx.textAlign = 'center';
        ctx.fillText('⭐', d.x, d.y);
        ctx.restore();
    });
}

// =============================================================
//  SCREEN FLASH
// =============================================================
function setFlash(color, alpha) { flash = { color, alpha }; }

function drawFlash() {
    if (!flash) return;
    ctx.save();
    ctx.fillStyle = flash.color;
    ctx.globalAlpha = flash.alpha;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.restore();
    flash.alpha -= 0.025;
    if (flash.alpha <= 0) flash = null;
}

// =============================================================
//  HUD
// =============================================================
function drawHUD() {
    // Score
    ctx.save();
    ctx.fillStyle = '#4af';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`ניקוד: ${score}`, 10, 55);

    // Level
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fa0';
    ctx.fillText(`רמה ${currentLvl} / 5`, canvas.width/2, 55);

    // Lives
    ctx.textAlign = 'right';
    ctx.font = '22px serif';
    ctx.fillText('❤️'.repeat(lives), canvas.width - 10, 56);

    // Active PU icons
    let px = 10;
    PU_LIST.forEach(p => {
        if (activePU[p.id]) {
            ctx.font = '20px serif';
            ctx.textAlign = 'left';
            ctx.fillText(p.emoji, px, canvas.height - 10);
            px += 28;
        }
    });

    // Shield bar
    if (player.shieldTimer > 0) {
        const bw = 140, bh = 7;
        ctx.fillStyle = '#113';
        ctx.fillRect(10, canvas.height-28, bw, bh);
        ctx.fillStyle = '#4af';
        ctx.fillRect(10, canvas.height-28, bw*(player.shieldTimer/10000), bh);
        ctx.strokeStyle = '#4af'; ctx.lineWidth = 1;
        ctx.strokeRect(10, canvas.height-28, bw, bh);
    }
    // Laser bar
    if (player.laserTimer > 0) {
        const bw = 140, bh = 7;
        const by = player.shieldTimer > 0 ? canvas.height-38 : canvas.height-28;
        ctx.fillStyle = '#311';
        ctx.fillRect(10, by, bw, bh);
        ctx.fillStyle = '#f44';
        ctx.fillRect(10, by, bw*(player.laserTimer/8000), bh);
        ctx.strokeStyle = '#f44'; ctx.lineWidth = 1;
        ctx.strokeRect(10, by, bw, bh);
    }
    // Freeze bar
    if (freezeTimer > 0) {
        const bw = 140, bh = 7;
        const by = canvas.height - 48;
        ctx.fillStyle = '#113';
        ctx.fillRect(10, by, bw, bh);
        ctx.fillStyle = '#8ef';
        ctx.fillRect(10, by, bw*(freezeTimer/5000), bh);
        ctx.strokeStyle = '#8ef'; ctx.lineWidth = 1;
        ctx.strokeRect(10, by, bw, bh);
    }

    // Freeze overlay hint
    if (freezeTimer > 0) {
        ctx.fillStyle = 'rgba(100,200,255,0.07)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    ctx.restore();
}

// =============================================================
//  LOSE LIFE / GAME OVER
// =============================================================
function loseLife() {
    lives--;
    SFX.hit();
    setFlash('#f00', 0.5);
    spawnParticles(player.x, player.y, '#f44', 18);
    if (lives <= 0) triggerGameOver();
}

function triggerGameOver() {
    if (gState === 'gameover') return;
    gState = 'gameover';
    stopMusic();
    SFX.gameOver();
    saveScore();
    document.getElementById('lblFinalScore').textContent = `הניקוד הסופי שלך: ${score} 🌟`;
    showScreen('scnGameOver');
}

// =============================================================
//  LEVEL COMPLETE CHECK
// =============================================================
function checkLevelDone() {
    if (gState !== 'playing') return;
    if (enemies.length === 0 && !boss) {
        gState = 'levelDone';
        stopMusic();
        SFX.levelDone();
        document.getElementById('lblLevelScore').textContent = `ניקוד: ${score} 🌟`;
        showScreen('scnLevelDone');
    }
}

function nextLevel() {
    if (currentLvl >= 5) {
        gState = 'victory';
        saveScore();
        SFX.victory();
        document.getElementById('lblVictoryScore').textContent = `ניקוד סופי: ${score} 🏆`;
        showScreen('scnVictory');
        return;
    }
    currentLvl++;
    showPowerupScreen();
}

// =============================================================
//  SCORES
// =============================================================
function saveScore() {
    const arr = JSON.parse(localStorage.getItem('spaceKidsHS') || '[]');
    arr.push({ name: playerName, score, level: currentLvl, date: new Date().toLocaleDateString('he-IL') });
    arr.sort((a,b) => b.score - a.score);
    arr.splice(10);
    localStorage.setItem('spaceKidsHS', JSON.stringify(arr));
}

function showHighScores() {
    const arr = JSON.parse(localStorage.getItem('spaceKidsHS') || '[]');
    const tbody = document.getElementById('scoreTbody');
    tbody.innerHTML = arr.length === 0
        ? '<tr><td colspan="5" style="color:#667;padding:20px">אין ניקוד עדיין — קדימה לשחק!</td></tr>'
        : arr.map((s,i) =>
            `<tr><td class="gold">${i+1}</td><td>${s.name}</td>
             <td style="color:#4f4">${s.score}</td>
             <td style="color:#4af">${s.level}</td>
             <td style="color:#667;font-size:0.8em">${s.date||''}</td></tr>`
          ).join('');
    showScreen('scnScores');
}

function clearScores() {
    if (confirm('למחוק את כל הניקודים?')) {
        localStorage.removeItem('spaceKidsHS');
        showHighScores();
    }
}

// =============================================================
//  SCREEN MANAGEMENT
// =============================================================
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    if (id) document.getElementById(id).classList.add('active');
}

function backToMenu() {
    gState = 'menu';
    stopMusic();
    showScreen('scnMenu');
}

// =============================================================
//  GAME START FLOW
// =============================================================
function startGame() {
    const n = document.getElementById('inpName').value.trim();
    if (!n) { document.getElementById('inpName').focus(); return; }
    playerName = n;
    difficulty  = parseInt(document.getElementById('slDiff').value);
    maxLives    = parseInt(document.getElementById('slLives').value);
    lives       = maxLives;
    score       = 0;
    currentLvl  = 1;
    showPowerupScreen();
}

function showPowerupScreen() {
    selPowerups = [];
    document.getElementById('lblPuLevel').textContent = currentLvl;
    document.getElementById('lblSelCount').textContent = '0';
    document.getElementById('btnStartLevel').disabled = true;

    const grid = document.getElementById('puGrid');
    grid.innerHTML = '';
    PU_LIST.forEach(pu => {
        const btn = document.createElement('button');
        btn.className = 'pu-btn';
        btn.innerHTML = `${pu.emoji}<br><b style="font-size:0.9em">${pu.name}</b><br><span style="color:#89a;font-size:0.78em">${pu.desc}</span>`;
        btn.dataset.id = pu.id;
        btn.onclick = () => togglePU(pu.id, btn);
        grid.appendChild(btn);
    });
    showScreen('scnPowerup');
    gState = 'powerup';
}

function togglePU(id, btn) {
    const idx = selPowerups.indexOf(id);
    if (idx >= 0) {
        selPowerups.splice(idx,1);
        btn.classList.remove('sel');
    } else {
        if (selPowerups.length >= 5) return;
        selPowerups.push(id);
        btn.classList.add('sel');
    }
    document.getElementById('lblSelCount').textContent = selPowerups.length;
    document.getElementById('btnStartLevel').disabled = selPowerups.length < 5;
}

function startLevel() {
    activePU = {};
    selPowerups.forEach(id => activePU[id] = true);
    if (activePU.freeze) { SFX.freeze(); }
    if (activePU.bomb)   SFX.powerup();

    bullets=[]; eBullets=[]; particles=[]; starDrops=[]; flash=null;
    initStars();
    initPlayer();
    spawnEnemies();
    gState = 'playing';
    showScreen(null);
    startMusic();
}

// =============================================================
//  SLIDERS
// =============================================================
const DIFF_NAMES = {1:'איטי ופשוט',2:'קל',3:'בינוני',4:'קשה',5:'מקצוען! 🔥'};
document.getElementById('slDiff').addEventListener('input', function() {
    document.getElementById('lblDiff').textContent = this.value;
    document.getElementById('lblDiffDesc').textContent = ' — ' + DIFF_NAMES[this.value];
});
document.getElementById('slLives').addEventListener('input', function() {
    document.getElementById('lblLives').textContent = this.value;
});

// =============================================================
//  MAIN LOOP
// =============================================================
let lastT = 0;
function loop(ts) {
    const dt = Math.min(ts - lastT, 50);
    lastT = ts;

    const bg = LVL_CFG[currentLvl]?.bg || '#000012';
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drawStars();
    tickStars();

    if (gState === 'playing') {
        updatePlayer(dt);
        updateEnemies(dt);
        updateBullets(dt);
        tickParticles(dt);
        tickDrops(dt);
        checkLevelDone();
    }

    drawEnemies();
    drawBullets();
    drawParticles();
    drawDrops();
    drawPlayer();
    drawFlash();

    if (gState === 'playing') drawHUD();

    requestAnimationFrame(loop);
}

initStars();
requestAnimationFrame(loop);
</script>
